<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Hot Wheels Marketplace</h1>
    <div class="cart">
        Cart: <span id="cart-count">0</span> items
    </div>
</header>

<section class="products">

    <div class="product">
        <img src="images/car1.jpg" alt="Hot Wheels Car">
        <h3>1967 Camaro</h3>
        <p>$15.00</p>
        <button onclick="addToCart('1967 Camaro', 15)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/car2.jpg" alt="Hot Wheels Car">
        <h3>Nissan Skyline GT-R</h3>
        <p>$20.00</p>
        <button onclick="addToCart('Nissan Skyline GT-R', 20)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/car3.jpg" alt="Hot Wheels Car">
        <h3>Toyota Supra</h3>
        <p>$18.00</p>
        <button onclick="addToCart('Toyota Supra', 18)">Add to Cart</button>
    </div>

</section>

<section class="cart-details">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: $<span id="cart-total">0</span></h3>
</section>

<footer>
    <p>&copy; 2026 Hot Wheels Marketplace</p>
</footer>

<script src="script.js"></script>
</body>
</html>
